<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover'>
<meta name='theme-color' content='#e7ebee'>
<title>StarCraft TMG — Rules Compendium</title>
<link rel='stylesheet' href='assets/app.css'>
</head>
<body>
<div class='app' id='app'>
  <header class='topbar'>
    <div class='masthead'>
      <div class='brand-block'>
        <div class='brand-title'>RULES COMPENDIUM</div>
        <div class='brand-sub'>StarCraft: The Miniatures Game</div>
      </div>
      <div class='mast-actions'>
        <button class='icon-btn' id='tocBtn' aria-label='Open contents'>☰</button>
        <button class='icon-btn' id='searchBtn' aria-label='Open search'>⌕</button>
        <button class='icon-btn' id='printBtn' aria-label='Printable version'>🖨</button>
      </div>
    </div>
    <div class='header-rule'></div>
  </header>
  <main class='main'>
    <section id='view-home' class='view active'></section>
    <section id='view-play' class='view'></section>
    <section id='view-systems' class='view'></section>
    <section id='view-reference' class='view'></section>
    <section id='view-search' class='view'>
      <div class='view-section search-panel'>
        <div class='field-row'>
          <input id='globalSearch' type='search' placeholder='Search the full rulebook' inputmode='search' autocomplete='off' />
          <button class='field-clear' id='clearGlobalSearch'>×</button>
        </div>
        <div id='searchResultCount' class='small-note'></div>
      </div>
      <div id='searchResults'></div>
    </section>
  </main>
  <div class='toc-sheet hidden' id='tocSheet' aria-hidden='true'>
    <div class='toc-backdrop' id='tocClose'></div>
    <div class='toc-panel'>
      <div class='toc-head'>
        <div>
          <div class='toc-title'>CONTENTS</div>
          <div class='toc-sub'>Full rules by Part</div>
        </div>
        <button class='icon-btn' id='tocCloseBtn'>×</button>
      </div>
      <div id='tocList' class='toc-list'></div>
    </div>
  </div>
  <button class='jump-top hidden' id='jumpTop' aria-label='Back to top'>↑</button>
  <nav class='bottom-nav' aria-label='Primary'>
    <button class='nav-btn active' data-view='home'><span class='nav-glyph'>⌂</span><span class='nav-text'>Home</span></button>
    <button class='nav-btn' data-view='play'><span class='nav-glyph'>↻</span><span class='nav-text'>Play</span></button>
    <button class='nav-btn' data-view='systems'><span class='nav-glyph'>§</span><span class='nav-text'>Systems</span></button>
    <button class='nav-btn' data-view='reference'><span class='nav-glyph'>◎</span><span class='nav-text'>Reference</span></button>
    <button class='nav-btn' data-view='search'><span class='nav-glyph'>⌕</span><span class='nav-text'>Search</span></button>
  </nav>
</div>
<script src='assets/app.js'></script>
</body>
</html>
